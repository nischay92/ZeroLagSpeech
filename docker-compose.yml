services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zerolag}:${POSTGRES_PASSWORD:-zerolag}@db:5432/${POSTGRES_DB:-zerolag}
      DATABASE_REQUIRED: "true"
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zerolag}
      POSTGRES_USER: ${POSTGRES_USER:-zerolag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zerolag}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-zerolag} -d ${POSTGRES_DB:-zerolag}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
